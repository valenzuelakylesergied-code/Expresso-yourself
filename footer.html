<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="expressoyourself.css" />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <footer>
      <section class="container">
        <div
          class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-start align-items-center gap-3"
        >
          <div class="footer-brand">
            <h3 class="footer-title mb-1 text-center text-lg-start">
              Espresso Yourself
            </h3>
            <p class="footer-text">
              Crafted coffee, cozy moments, and creativity in every sip.
            </p>
          </div>

          <ul class="footer-links d-flex gap-4 list-unstyled">
            <li><a href="#">Products</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </div>

        <hr />

        <div
          class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2"
        >
          <p class="mb-5">© 2026 Espresso Yourself. All rights reserved.</p>

          <div class="socials d-flex gap-3">
            <a title="instagram" href="instagram.com"
              ><i class="bi bi-instagram"></i
            ></a>
            <a title="fb" href="facebook.com"><i class="bi bi-facebook"></i></a>
            <a title="x" href="x.com"><i class="bi bi-twitter-x"></i></a>
          </div>
        </div>
      </section>
    </footer>
  </body>
</html>
