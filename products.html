<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Espresso Yourself</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="expressoyourself.css" />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!--Bootstrap Icons-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div id="nav"></div>

    <div class="container text-center products-page">
      <div class="menu-nav navbar row shadow">
        <div class="menu-item col-3">
          <img src="imgs/nav-caf.png" alt="" />
          <h3>Coffee</h3>
        </div>
        <div class="menu-item col-3">
          <img src="imgs/nav-noncaf.png" alt="" />
          <h3>Non-Coffee</h3>
        </div>
        <div class="menu-item col-3">
          <img src="imgs/nav-bread.png" alt="" />
          <h3>Bread</h3>
        </div>
        <div class="menu-item col-3">
          <img src="imgs/nav-pasta.png" alt="" />
          <h3>Pasta</h3>
        </div>
      </div>

      <div class="products mt-3 p-1 mt-2"><h5>Product</h5></div>
    </div>

    <script>
      fetch("nav.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("nav").innerHTML = data;
        });
    </script>
  </body>
</html>
